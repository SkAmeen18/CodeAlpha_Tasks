<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha | Modern Glass Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
        }

        /* The Glass Container */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            width: 350px;
            padding: 20px;
        }
        .display-screen {
            width: 100%;
            margin-bottom: 20px;
        }

        #display {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            outline: none;
            border-radius: 12px;
            color: #fff;
            font-size: 2.5rem;
            text-align: right;
            padding: 10px 20px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            height: 65px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }
        .operator {
            background: rgba(255, 153, 0, 0.2);
            color: #ffb84d;
        }

        .operator:hover {
            background: rgba(255, 153, 0, 0.4);
        }

        .equals {
            grid-column: span 2;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #fff;
            font-weight: 600;
        }

        .clear {
            grid-column: span 2;
            background: rgba(0, 0, 0, 0);
            color: #f7f2f2;
        }

        .clear:hover {
            background: rgb(236, 3, 3);
        }
        .bubble {
            position: absolute;
            z-index: -1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(30px);
        }
    </style>
</head>
<body>

    <div class="bubble" style="width: 150px; height: 150px; top: 10%; left: 20%; background: #4facfe;"></div>
    <div class="bubble" style="width: 200px; height: 200px; bottom: 10%; right: 20%; background: #00f2fe;"></div>

    <div class="container">
        <div class="display-screen">
            <input type="text" id="display" placeholder="0" readonly>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">−</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            if (display.value === "Error") clearDisplay();
            if (input === '.') {
                const parts = display.value.split(/[\+\-\*\/]/);
                const lastPart = parts[parts.length - 1];
                if (lastPart.includes('.')) return;
            }
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            if (display.value === "") return;
            try {
                let result = eval(display.value);
                display.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
            } catch (error) {
                display.value = "Error";
            }
        }
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (/[0-9.]/.test(key)) appendToDisplay(key);
            else if (['+', '-', '*', '/'].includes(key)) appendToDisplay(key);
            else if (key === 'Enter' || key === '=') { e.preventDefault(); calculate(); }
            else if (key === 'Backspace') deleteLast();
            else if (key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
