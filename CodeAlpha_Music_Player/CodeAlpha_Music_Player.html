<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player | Md. Muttakin Ali</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff9100;
            --primary-hover: #e68200;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background: radial-gradient(circle at center, #1a1200 0%, #050505 80%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .song-art {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
            border-radius: 20px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--card-border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .song-art i { font-size: 5rem; color: var(--primary); }

        .song-details h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        .song-details p { color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 25px; }

        .progress-area { height: 6px; width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; }
        .progress-bar { height: inherit; width: 0%; background: var(--primary); border-radius: inherit; position: relative; }
        
        .timer { display: flex; justify-content: space-between; margin-top: 10px; color: var(--text-dim); font-size: 0.75rem; font-family: 'Fira Code', monospace; }

        .controls { display: flex; align-items: center; justify-content: space-between; margin: 30px 0; }
        .controls button { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .controls button:hover { color: var(--primary); transform: scale(1.1); }

        .play-pause { 
            width: 65px; height: 65px; background: var(--primary); color: black !important; 
            border-radius: 50%; font-size: 1.5rem !important; display: flex; align-items: center; justify-content: center;
        }

        .volume-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .volume-container i { color: var(--text-dim); font-size: 0.8rem; }
        input[type="range"] { flex: 1; accent-color: var(--primary); cursor: pointer; height: 4px; }

        .playlist { margin-top: 25px; text-align: left; border-top: 1px solid var(--card-border); padding-top: 20px; }
        .playlist h4 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 15px; }
        .track-item { 
            display: flex; justify-content: space-between; padding: 10px; border-radius: 10px; 
            cursor: pointer; transition: 0.2s; font-size: 0.85rem; margin-bottom: 5px;
        }
        .track-item:hover { background: rgba(255, 145, 0, 0.1); color: var(--primary); }
        .track-item.active { background: rgba(255, 145, 0, 0.2); color: var(--primary); font-weight: 700; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="song-art" id="art-container">
            <i class="fas fa-music"></i>
        </div>

        <div class="song-details">
            <h2 id="song-title">Select a Track</h2>
            <p id="song-artist">Player</p>
        </div>

        <div class="progress-area" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="timer">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="prev"><i class="fas fa-step-backward"></i></button>
            <button class="play-pause" id="play-pause">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
            <button id="next"><i class="fas fa-step-forward"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="70">
            <i class="fas fa-volume-up"></i>
        </div>

        <div class="playlist">
            <h4>Playlist</h4>
            <div id="track-list"></div>
        </div>
    </div>

    <audio id="main-audio" src=""></audio>

    <script>
        const musicList = [
            { name: "Numb", artist: "Linkin Park", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "Cool Vibes", artist: "Lo-Fi", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "Algorithm Beat", artist: "User Mix", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];

        const audio = document.getElementById("main-audio");
        const playPauseBtn = document.getElementById("play-pause");
        const playIcon = document.getElementById("play-icon");
        const title = document.getElementById("song-title");
        const artist = document.getElementById("song-artist");
        const progressBar = document.getElementById("progress-bar");
        const progressArea = document.getElementById("progress-area");
        const volumeSlider = document.getElementById("volume-slider");
        const trackListContainer = document.getElementById("track-list");
        const currentTimeTxt = document.getElementById("current-time");
        const durationTxt = document.getElementById("duration");

        let index = 0;
        let isPlaying = false;

        window.addEventListener("load", () => {
            loadSong(index);
            renderPlaylist();
        });

        function loadSong(num) {
            title.innerText = musicList[num].name;
            artist.innerText = musicList[num].artist;
            audio.src = musicList[num].src;
            
            // RESET UI on change
            progressBar.style.width = "0%";
            currentTimeTxt.innerText = "0:00";
            durationTxt.innerText = "0:00";
            
            highlightTrack();
        }

        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            let min = Math.floor(time / 60);
            let sec = Math.floor(time % 60);
            if (sec < 10) sec = `0${sec}`;
            return `${min}:${sec}`;
        }

        function playMusic() {
            isPlaying = true;
            playIcon.classList.replace("fa-play", "fa-pause");
            audio.play();
        }

        function pauseMusic() {
            isPlaying = false;
            playIcon.classList.replace("fa-pause", "fa-play");
            audio.pause();
        }

        playPauseBtn.addEventListener("click", () => {
            isPlaying ? pauseMusic() : playMusic();
        });

        document.getElementById("next").addEventListener("click", () => {
            index = (index + 1) % musicList.length;
            loadSong(index);
            playMusic();
        });

        document.getElementById("prev").addEventListener("click", () => {
            index = (index - 1 + musicList.length) % musicList.length;
            loadSong(index);
            playMusic();
        });

        // FIXED: Duration update on metadata load
        audio.onloadedmetadata = function() {
            durationTxt.innerText = formatTime(audio.duration);
        };

        // FIXED: Continuous progress update
        audio.addEventListener("timeupdate", (e) => {
            const current = e.target.currentTime;
            const duration = e.target.duration;
            if (duration) {
                let width = (current / duration) * 100;
                progressBar.style.width = `${width}%`;
                currentTimeTxt.innerText = formatTime(current);
            }
        });

        progressArea.addEventListener("click", (e) => {
            let width = progressArea.clientWidth;
            let clickedX = e.offsetX;
            audio.currentTime = (clickedX / width) * audio.duration;
            playMusic();
        });

        volumeSlider.addEventListener("input", (e) => {
            audio.volume = e.target.value / 100;
        });

        audio.addEventListener("ended", () => {
            document.getElementById("next").click();
        });

        function renderPlaylist() {
            trackListContainer.innerHTML = musicList.map((track, i) => `
                <div class="track-item" onclick="playSelected(${i})">
                    <span>${track.name}</span>
                    <span>${track.artist}</span>
                </div>
            `).join("");
        }

        function highlightTrack() {
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        window.playSelected = function(i) {
            index = i;
            loadSong(index);
            playMusic();
        }
    </script>
</body>
</html>
